name: Build and Push Docker

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
          -t eshim88/openrouter-bot:latest \
          -t eshim88/openrouter-bot:${{ steps.vars.outputs.TAG }} \
          .

      - name: Push
        run: |
          docker push eshim88/openrouter-bot:latest
          docker push eshim88/openrouter-bot:${{ steps.vars.outputs.TAG }}
